<!DOCTYPE html>
<html>
<head>
    <title>Register Customer</title>
</head>
<body>

<h1>Customer Registration</h1>


{% if messages %}

    {% for message in messages %}

        <h3>{{ message }}</h3>

    {% endfor %}

{% endif %}


<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Register

    </button>

</form>

<br>

<a href="/">
    Back To Home
</a>

</body>
</html>
